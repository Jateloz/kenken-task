name: KenKen Static Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check all required files exist at root
        run: |
          test -f task.toml            && echo "task.toml OK" || (echo "MISSING task.toml" && exit 1)
          test -f instruction.md       && echo "instruction.md OK" || (echo "MISSING instruction.md" && exit 1)
          test -f solution/solve.sh    && echo "solution/solve.sh OK" || (echo "MISSING solution/solve.sh" && exit 1)
          test -f tests/test.sh        && echo "tests/test.sh OK" || (echo "MISSING tests/test.sh" && exit 1)
          test -f tests/test_outputs.py && echo "tests/test_outputs.py OK" || (echo "MISSING tests/test_outputs.py" && exit 1)
          test -f environment/Dockerfile && echo "Dockerfile OK" || (echo "MISSING Dockerfile" && exit 1)

      - name: Check task.toml required fields
        run: |
          grep -q 'version = "2.0"'          task.toml && echo "version OK"
          grep -q 'allow_internet = false'    task.toml && echo "allow_internet OK"
          grep -q 'codebase_size = "minimal"' task.toml && echo "codebase_size OK"
          grep -q 'category = "software-engineering"' task.toml && echo "category OK"

      - name: Check Dockerfile digest pin
        run: |
          grep -q '@sha256:' environment/Dockerfile \
            && echo "Digest pin OK" \
            || (echo "ERROR: Dockerfile base image must be digest-pinned with @sha256:" && exit 1)

      - name: Check test.sh reward section format
        run: |
          grep -q 'echo 1 > /logs/verifier/reward.txt' tests/test.sh \
            && echo "Reward section OK" \
            || (echo "ERROR: reward section missing or wrong format" && exit 1)

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python test dependencies
        run: pip install pytest==8.4.1 pytest-json-ctrf==0.3.5

      - name: Run oracle solution
        run: |
          sudo mkdir -p /app
          sudo chown $USER /app
          bash solution/solve.sh
          echo "Oracle ran successfully"
          find /app -type f | sort

      - name: Run pytest test_outputs.py
        run: python -m pytest tests/test_outputs.py -v

      - name: Install Node test dependencies
        run: |
          cd tests
          npm install

      - name: Run Vitest unit tests
        run: |
          cd tests
          npx vitest run

      - name: Install Playwright browser
        run: |
          cd tests
          npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: |
          cd tests
          npx playwright test